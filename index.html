
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Für dich ❤️</title>
<style>
  :root{
    --pink:#ff7eb3;
    --pink-soft:#ffd1e3;
    --plum:#b5477e;
    --cream:#fff5fa;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    background:linear-gradient(135deg,#ffe0ee 0%,#ffd6f0 40%,#e8d4ff 100%);
    color:var(--plum);
    overflow-x:hidden;
    min-height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  /* schwebende Herzen im Hintergrund */
  .heart-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
  .heart-bg span{
    position:absolute;bottom:-60px;font-size:24px;
    animation:floatUp linear infinite;opacity:.7;
  }
  @keyframes floatUp{
    0%{transform:translateY(0) rotate(0);opacity:0}
    10%{opacity:.8}
    100%{transform:translateY(-110vh) rotate(360deg);opacity:0}
  }

  .card{
    position:relative;z-index:1;
    background:rgba(255,255,255,.75);
    backdrop-filter:blur(10px);
    border-radius:32px;
    padding:48px 36px;
    max-width:520px;
    width:100%;
    text-align:center;
    box-shadow:0 20px 60px rgba(181,71,126,.25);
    animation:pop .8s cubic-bezier(.18,.89,.32,1.28);
  }
  @keyframes pop{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}

  .kitty{width:210px;height:auto;display:block;margin:0 auto 10px;animation:sway 3s ease-in-out infinite;transform-origin:bottom center}
  @keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}

  .big-heart{font-size:56px;animation:beat 1.4s ease-in-out infinite;display:inline-block}
  @keyframes beat{0%,100%{transform:scale(1)}15%{transform:scale(1.25)}30%{transform:scale(1)}45%{transform:scale(1.18)}}

  h1{
    font-size:2rem;margin:12px 0 8px;
    background:linear-gradient(90deg,var(--pink),var(--plum));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .sub{font-size:1.05rem;color:#a85b86;margin-bottom:28px;line-height:1.5}

  #message{
    font-size:1.3rem;font-weight:600;min-height:64px;
    display:flex;align-items:center;justify-content:center;
    padding:18px;border-radius:20px;background:var(--cream);
    box-shadow:inset 0 0 0 2px var(--pink-soft);
    transition:transform .3s;line-height:1.4;
  }
  #message.show{animation:wiggle .5s}
  @keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-2deg)}75%{transform:rotate(2deg)}}

  .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px}
  button{
    font-family:inherit;font-size:1rem;font-weight:700;
    border:none;border-radius:999px;padding:14px 26px;cursor:pointer;
    color:#fff;background:linear-gradient(90deg,var(--pink),var(--plum));
    box-shadow:0 8px 20px rgba(255,126,179,.5);
    transition:transform .15s, box-shadow .15s;
  }
  button:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 12px 26px rgba(255,126,179,.6)}
  button:active{transform:translateY(0) scale(.98)}
  .btn-ghost{
    background:#fff;color:var(--plum);
    box-shadow:0 8px 20px rgba(181,71,126,.18);
  }

  .counter{margin-top:18px;font-size:.9rem;color:#bb78a0}

  /* Konfetti / Herzregen beim Klick */
  .pop-heart{position:fixed;z-index:50;pointer-events:none;font-size:28px;animation:burst .9s ease-out forwards}
  @keyframes burst{0%{transform:translate(0,0) scale(.4);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(1.3);opacity:0}}

  footer{margin-top:26px;font-size:.85rem;color:#c98bae}
</style>
</head>
<body>
  <div class="heart-bg" id="heartBg"></div>

  <div class="card">
    <svg class="kitty" viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg" aria-label="Hello Kitty">
      <defs>
        <radialGradient id="faceShade" cx="50%" cy="42%" r="62%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#fbeef4"/>
        </radialGradient>
        <linearGradient id="bow" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ff8fc0"/>
          <stop offset="100%" stop-color="#ff4f9a"/>
        </linearGradient>
        <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#d36ca0" flood-opacity="0.35"/>
        </filter>
      </defs>

      <g filter="url(#soft)">
        <!-- Ohren -->
        <path d="M48 62 Q34 14 84 44 Z" fill="url(#faceShade)" stroke="#444" stroke-width="3.5" stroke-linejoin="round"/>
        <path d="M172 62 Q186 14 136 44 Z" fill="url(#faceShade)" stroke="#444" stroke-width="3.5" stroke-linejoin="round"/>
        <!-- Kopf -->
        <path d="M110 36
                 C166 36 196 70 196 108
                 C196 152 160 178 110 178
                 C60 178 24 152 24 108
                 C24 70 54 36 110 36 Z"
              fill="url(#faceShade)" stroke="#444" stroke-width="3.5"/>
      </g>

      <!-- Schleife (rechtes Ohr) -->
      <g filter="url(#soft)">
        <ellipse cx="171" cy="64" rx="3" ry="3" fill="none"/>
        <path d="M160 66 C150 50 130 50 124 64 C130 78 150 78 160 66 Z" fill="url(#bow)" stroke="#d12b78" stroke-width="2.5" stroke-linejoin="round"/>
        <path d="M160 66 C170 50 192 50 198 64 C192 78 170 78 160 66 Z" fill="url(#bow)" stroke="#d12b78" stroke-width="2.5" stroke-linejoin="round"/>
        <circle cx="160" cy="66" r="9" fill="#ff6fb0" stroke="#d12b78" stroke-width="2.5"/>
        <circle cx="156" cy="62" r="2.6" fill="#fff" opacity="0.85"/>
        <circle cx="138" cy="60" r="2.2" fill="#fff" opacity="0.7"/>
        <circle cx="182" cy="60" r="2.2" fill="#fff" opacity="0.7"/>
      </g>

      <!-- Bäckchen -->
      <ellipse cx="66" cy="124" rx="13" ry="9" fill="#ffc2dd" opacity="0.8"/>
      <ellipse cx="154" cy="124" rx="13" ry="9" fill="#ffc2dd" opacity="0.8"/>

      <!-- Augen -->
      <ellipse cx="80" cy="108" rx="7.5" ry="11" fill="#3a3a3a"/>
      <ellipse cx="140" cy="108" rx="7.5" ry="11" fill="#3a3a3a"/>
      <circle cx="83" cy="103" r="2.6" fill="#fff"/>
      <circle cx="143" cy="103" r="2.6" fill="#fff"/>

      <!-- Nase -->
      <ellipse cx="110" cy="124" rx="8" ry="5.5" fill="#ffb01f" stroke="#e09a12" stroke-width="1.5"/>

      <!-- Schnurrhaare -->
      <g stroke="#444" stroke-width="3" stroke-linecap="round" fill="none">
        <path d="M30 104 Q48 104 62 110"/>
        <path d="M26 120 Q46 120 60 122"/>
        <path d="M30 136 Q48 134 62 134"/>
        <path d="M190 104 Q172 104 158 110"/>
        <path d="M194 120 Q174 120 160 122"/>
        <path d="M190 136 Q172 134 158 134"/>
      </g>
    </svg>
    <h1>Hey bibiii ❤️</h1>
    <p class="sub">Meine Amura, ich habe die Seite für dich gemacht, mein Engel. 🥰<br>Drück auf den Knopf für eine süße Nachricht 💌</p>

    <div id="message" class="show">Ich liebe dich, meine kleine Prinzessin. 👑💕</div>

    <div class="btns">
      <button id="nextBtn">Noch eine Nachricht 💌</button>
      <button class="btn-ghost" id="loveBtn">Drück mich 🌹</button>
    </div>

    <div class="counter" id="counter">Herzchen verschickt: 0</div>

    <footer>Mit ganz viel Liebe gemacht ✨</footer>
  </div>

<script>
  // Süße Nachrichten – hier kannst du eigene hinzufügen!
  const messages = [
    "Ich liebe dich, meine kleine Prinzessin. 👑💕",
    "Ich glaube immer an dich – du bist das stärkste Mädchen in der Welt. 💖",
    "Du bist das Beste, was mir passiert ist. 💕",
    "Jeder Tag mit dir fühlt sich wie ein Geschenk an. 🎁",
    "Dein Lächeln macht meine Welt heller. 🌞",
    "Ich denke öfter an dich, als du glaubst. 🥹",
    "Mit dir ist sogar ein normaler Tag etwas Besonderes. ✨",
    "Du bist wunderschön – innen wie außen. 🌸",
    "Ich bin so froh, dass es dich gibt. 🫶",
    "Ich liebe dich – heute, morgen und für immer. ♾️"
  ];

  const msgEl = document.getElementById('message');
  const counterEl = document.getElementById('counter');
  let i = 0, sent = 0;

  function showMessage(text){
    msgEl.classList.remove('show');
    void msgEl.offsetWidth; // reflow für Animation
    msgEl.textContent = text;
    msgEl.classList.add('show');
  }

  document.getElementById('nextBtn').addEventListener('click', ()=>{
    i = (i + 1) % messages.length;
    showMessage(messages[i]);
  });

  // Herzregen beim "Drück mich"
  document.getElementById('loveBtn').addEventListener('click', (e)=>{
    sent++;
    counterEl.textContent = "Herzchen verschickt: " + sent;
    const emojis = ['❤️','💖','💕','🌹','💗','🥰','💞'];
    for(let k=0;k<14;k++){
      const h = document.createElement('div');
      h.className = 'pop-heart';
      h.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      h.style.left = e.clientX + 'px';
      h.style.top = e.clientY + 'px';
      h.style.setProperty('--dx', (Math.random()*300-150)+'px');
      h.style.setProperty('--dy', (-Math.random()*260-60)+'px');
      document.body.appendChild(h);
      setTimeout(()=>h.remove(), 900);
    }
    if(sent === 10){
      showMessage("10 Herzchen! Du verdienst sie alle und noch viel mehr. 🥹💝");
    }
  });

  // Hintergrund-Herzen erzeugen
  const bg = document.getElementById('heartBg');
  const bgEmojis = ['💗','💖','💕','🌸','✨','💞'];
  for(let n=0;n<22;n++){
    const s = document.createElement('span');
    s.textContent = bgEmojis[Math.floor(Math.random()*bgEmojis.length)];
    s.style.left = Math.random()*100 + 'vw';
    s.style.fontSize = (Math.random()*22+14) + 'px';
    s.style.animationDuration = (Math.random()*10+8) + 's';
    s.style.animationDelay = (Math.random()*8) + 's';
    bg.appendChild(s);
  }
</script>
</body>
</html>
